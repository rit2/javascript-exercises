<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Form Validation</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><h1>📋 Form Validation</h1><form id="form"><div class="form-group"><label>Name</label><input type="text" id="name" placeholder="Your name"><span class="error" id="nameError"></span></div><div class="form-group"><label>Email</label><input type="email" id="email" placeholder="Your email"><span class="error" id="emailError"></span></div><div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Password"><span class="error" id="passwordError"></span></div><button type="submit">Submit</button></form><div id="success" class="success">Success!</div></div><script src="script.js"></script></body></html>
