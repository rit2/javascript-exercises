<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Survey Form</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><h1>📝 Survey Form</h1><div class="progress"><div id="progress-bar" class="progress-bar"></div></div><form id="form"><div class="step active" id="step1"><h2>Step 1: Personal Info</h2><label>Name</label><input type="text" id="name" required><label>Email</label><input type="email" id="email" required><button type="button" class="next">Next</button></div><div class="step" id="step2"><h2>Step 2: Preferences</h2><label>Favorite Color</label><select id="color"><option>Red</option><option>Blue</option><option>Green</option></select><button type="button" class="prev">Previous</button><button type="button" class="next">Next</button></div><div class="step" id="step3"><h2>Step 3: Feedback</h2><label>Comments</label><textarea id="comments"></textarea><button type="button" class="prev">Previous</button><button type="submit">Submit</button></div></form><div id="success" class="success">Thank you for your submission!</div></div><script src="script.js"></script></body></html>
